name: Tarjetas LaLiga
on:
  schedule:
    - cron: '0 5 1,15 * *' # Cada 2 semanas (día 1 y 15) a las 11pm Juárez / 05:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_REPO_TOKEN }}
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install requests numpy
      - name: Ejecutar script de Tarjetas
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python cards.py
      - name: Subir cambios al repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f modelo_poisson.json ]; then
            git add modelo_poisson.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática: Tarjetas LaLiga" && git push origin HEAD:main)
          else
            echo "⚠️ Archivo modelo_poisson.json no encontrado, saltando commit."
          fi
