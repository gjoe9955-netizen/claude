name: Entrenador Poisson España

on:
  schedule:
    - cron: '0 */12 * * *' # Cada 12 horas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_REPO_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests pandas numpy scipy understat aiohttp

      - name: Ejecutar el script Trainer
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python trainer.py

      - name: Subir cambios al repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f modelo_poisson.json ]; then
            git add modelo_poisson.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática: Modelo Poisson con IDs" && git push origin HEAD:main)
          else
            echo "⚠️ Archivo modelo_poisson.json no encontrado, saltando commit."
          fi
